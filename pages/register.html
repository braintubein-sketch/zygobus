<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up – ZygoBus</title>
  <meta name="description" content="Create your ZygoBus account. Sign up for free and start booking bus tickets with exclusive offers." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/auth.css" />
</head>
<body>

<nav class="navbar scrolled">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <div class="logo-icon"><i class="fas fa-bus"></i></div>
      <span>Zygo<span class="logo-accent">Bus</span></span>
    </a>
    <div class="nav-actions">
      <a href="login.html" class="btn-ghost">Login</a>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <a href="../index.html" class="auth-logo">
        <div class="logo-icon"><i class="fas fa-bus"></i></div>
        <span>Zygo<span class="logo-accent">Bus</span></span>
      </a>
      <h1>Create Account</h1>
      <p>Join ZygoBus and start booking smarter today</p>
    </div>

    <div class="auth-card">
      <div class="auth-error" id="authError">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMsg"></span>
      </div>

      <form class="auth-form" id="registerForm" onsubmit="return false;">
        <div class="auth-row">
          <div class="auth-field">
            <label>First Name</label>
            <div class="input-wrapper">
              <input type="text" id="regFirst" placeholder="Rahul" required />
              <i class="fas fa-user"></i>
            </div>
          </div>
          <div class="auth-field">
            <label>Last Name</label>
            <div class="input-wrapper">
              <input type="text" id="regLast" placeholder="Sharma" required />
              <i class="fas fa-user"></i>
            </div>
          </div>
        </div>

        <div class="auth-field">
          <label>Email Address</label>
          <div class="input-wrapper">
            <input type="email" id="regEmail" placeholder="you@example.com" required />
            <i class="fas fa-envelope"></i>
          </div>
        </div>

        <div class="auth-field">
          <label>Mobile Number</label>
          <div class="input-wrapper">
            <input type="tel" id="regMobile" placeholder="9876543210" required />
            <i class="fas fa-phone"></i>
          </div>
        </div>

        <div class="auth-field">
          <label>Password</label>
          <div class="input-wrapper">
            <input type="password" id="regPassword" placeholder="Min 6 characters" required minlength="6" />
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-password" onclick="togglePass('regPassword', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="auth-field">
          <label>Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="regConfirm" placeholder="Re-enter password" required />
            <i class="fas fa-lock"></i>
            <button type="button" class="toggle-password" onclick="togglePass('regConfirm', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <div class="auth-options">
          <label><input type="checkbox" id="agreeTerms" /> I agree to <a href="#">Terms</a> & <a href="#">Privacy</a></label>
        </div>

        <button type="submit" class="auth-btn" id="registerBtn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>

        <div class="auth-divider">or sign up with</div>

        <div class="social-auth">
          <button type="button" class="social-btn google"><i class="fab fa-google"></i> Google</button>
          <button type="button" class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
        </div>
      </form>
    </div>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3001/api' : '/api';

function togglePass(inputId, btn) {
  const input = document.getElementById(inputId);
  const icon = btn.querySelector('i');
  if (input.type === 'password') { input.type = 'text'; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
  else { input.type = 'password'; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

function showError(msg) {
  document.getElementById('errorMsg').textContent = msg;
  document.getElementById('authError').classList.add('show');
}

document.getElementById('registerForm').addEventListener('submit', async () => {
  const firstName = document.getElementById('regFirst').value.trim();
  const lastName = document.getElementById('regLast').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const mobile = document.getElementById('regMobile').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirm = document.getElementById('regConfirm').value;

  document.getElementById('authError').classList.remove('show');

  if (!firstName || !lastName || !email || !mobile || !password) { showError('Please fill all fields'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters'); return; }
  if (password !== confirm) { showError('Passwords do not match'); return; }
  if (!document.getElementById('agreeTerms').checked) { showError('Please agree to Terms & Privacy'); return; }

  const btn = document.getElementById('registerBtn');
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...';
  btn.disabled = true;

  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ firstName, lastName, email, mobile, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');

    localStorage.setItem('zygobus_token', data.token);
    localStorage.setItem('zygobus_user', JSON.stringify(data.user));
    showToast('✅ Account created successfully!');
    setTimeout(() => window.location.href = '../index.html', 800);
  } catch (err) {
    showError(err.message);
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    btn.disabled = false;
  }
});
</script>
</body>
</html>
