<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Bookings – ZygoBus</title>
  <meta name="description" content="View and manage your bus ticket bookings on ZygoBus." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .bookings-page { min-height:100vh; padding:100px 0 60px; }
    .bookings-header { margin-bottom:32px; }
    .bookings-header h1 { font-family:'Outfit',sans-serif; font-size:2rem; font-weight:800; margin-bottom:8px; }
    .bookings-header p { color:var(--text-muted); }
    .bookings-tabs { display:flex; gap:8px; margin-bottom:28px; flex-wrap:wrap; }
    .bk-tab { padding:10px 24px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-weight:600; cursor:pointer; font-family:inherit; font-size:0.9rem; transition:var(--transition); }
    .bk-tab.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .bk-tab:hover:not(.active) { border-color:var(--primary); color:var(--primary); }
    .booking-list { display:flex; flex-direction:column; gap:16px; }
    .bk-card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; transition:var(--transition); }
    .bk-card:hover { border-color:rgba(26,86,219,0.4); box-shadow:var(--shadow); }
    .bk-card-top { display:grid; grid-template-columns:1fr auto 1fr auto auto; align-items:center; gap:20px; padding:24px; }
    .bk-city { text-align:center; }
    .bk-city-name { font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:800; }
    .bk-city-sub { font-size:0.8rem; color:var(--text-muted); margin-top:4px; }
    .bk-arrow { color:var(--primary); font-size:1.2rem; }
    .bk-duration { text-align:center; font-size:0.8rem; color:var(--text-muted); }
    .bk-duration strong { display:block; font-size:0.9rem; color:var(--text); margin-top:2px; }
    .bk-price { text-align:right; }
    .bk-price-val { font-family:'Outfit',sans-serif; font-size:1.4rem; font-weight:800; color:var(--accent); }
    .bk-price-sub { font-size:0.75rem; color:var(--text-muted); margin-top:2px; }
    .bk-card-bottom { display:flex; align-items:center; gap:16px; padding:14px 24px; background:rgba(255,255,255,0.02); border-top:1px solid var(--border); flex-wrap:wrap; }
    .bk-meta { font-size:0.82rem; color:var(--text-muted); display:flex; align-items:center; gap:6px; }
    .bk-meta i { color:var(--primary); width:14px; }
    .bk-status { margin-left:auto; padding:6px 16px; border-radius:100px; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; }
    .status-confirmed { background:rgba(16,185,129,0.15); color:var(--success); border:1px solid rgba(16,185,129,0.3); }
    .status-completed { background:rgba(26,86,219,0.15); color:#60a5fa; border:1px solid rgba(26,86,219,0.3); }
    .status-cancelled { background:rgba(239,68,68,0.15); color:var(--danger); border:1px solid rgba(239,68,68,0.3); }
    .bk-actions { display:flex; gap:8px; }
    .bk-action-btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted); font-size:0.8rem; font-weight:600; cursor:pointer; transition:var(--transition); font-family:inherit; display:flex; align-items:center; gap:6px; }
    .bk-action-btn:hover { border-color:var(--primary); color:var(--primary); }
    .bk-action-btn.cancel-btn:hover { border-color:var(--danger); color:var(--danger); }
    .empty-bookings { text-align:center; padding:80px 24px; }
    .empty-bookings i { font-size:3rem; color:var(--text-muted); margin-bottom:20px; display:block; opacity:0.5; }
    .empty-bookings h3 { font-size:1.3rem; font-weight:700; margin-bottom:8px; }
    .empty-bookings p { color:var(--text-muted); margin-bottom:24px; }
    .empty-bookings a { display:inline-flex; align-items:center; gap:8px; background:var(--primary); padding:12px 28px; border-radius:var(--radius-sm); color:#fff; font-weight:700; transition:var(--transition); }
    .empty-bookings a:hover { background:var(--primary-dark); transform:translateY(-2px); }
    .login-prompt { text-align:center; padding:100px 24px; }
    .login-prompt i { font-size:3rem; color:var(--primary); margin-bottom:20px; display:block; }
    .login-prompt h2 { font-family:'Outfit',sans-serif; font-size:1.6rem; font-weight:800; margin-bottom:10px; }
    .login-prompt p { color:var(--text-muted); margin-bottom:28px; }
    .login-prompt a { display:inline-flex; align-items:center; gap:8px; background:var(--primary); padding:12px 28px; border-radius:var(--radius-sm); color:#fff; font-weight:700; transition:var(--transition); }
    .login-prompt a:hover { background:var(--primary-dark); }
    @media(max-width:700px){ .bk-card-top{grid-template-columns:1fr;gap:12px;text-align:center;} .bk-price{text-align:center;} .bk-status{margin-left:0;} }
  </style>
</head>
<body>

<nav class="navbar scrolled">
  <div class="nav-container">
    <a href="../index.html" class="nav-logo">
      <div class="logo-icon"><i class="fas fa-bus"></i></div>
      <span>Zygo<span class="logo-accent">Bus</span></span>
    </a>
    <ul class="nav-links" id="navLinks">
      <li><a href="../index.html">Home</a></li>
      <li><a href="search-results.html">Bus Search</a></li>
      <li><a href="offers.html">Offers</a></li>
      <li><a href="my-bookings.html" class="active">My Bookings</a></li>
    </ul>
    <div class="nav-actions" id="navActions">
      <a href="login.html" class="btn-ghost" id="loginBtn">Login</a>
      <a href="register.html" class="btn-primary-sm" id="signupBtn">Sign Up</a>
      <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
    </div>
  </div>
</nav>

<div class="bookings-page">
  <div class="container">
    <!-- Login Prompt (shown when not logged in) -->
    <div class="login-prompt" id="loginPrompt" style="display:none;">
      <i class="fas fa-user-lock"></i>
      <h2>Login Required</h2>
      <p>Please login to view your bookings and manage your trips.</p>
      <a href="login.html"><i class="fas fa-sign-in-alt"></i> Login Now</a>
    </div>

    <!-- Bookings Content (shown when logged in) -->
    <div id="bookingsContent" style="display:none;">
      <div class="bookings-header">
        <h1>My Bookings</h1>
        <p>Manage and track all your bus ticket bookings</p>
      </div>

      <div class="bookings-tabs">
        <button class="bk-tab active" data-filter="all">All Bookings</button>
        <button class="bk-tab" data-filter="confirmed">Upcoming</button>
        <button class="bk-tab" data-filter="completed">Completed</button>
        <button class="bk-tab" data-filter="cancelled">Cancelled</button>
      </div>

      <div class="booking-list" id="bookingList"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3001/api' : '/api';

const token = localStorage.getItem('zygobus_token');
const user = JSON.parse(localStorage.getItem('zygobus_user') || 'null');

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast show ${type}`;
  setTimeout(() => t.className = 'toast', 3000);
}

// Update nav for logged-in user
if (user) {
  const loginBtn  = document.getElementById('loginBtn');
  const signupBtn = document.getElementById('signupBtn');
  const navActions = document.getElementById('navActions');
  if (loginBtn)  loginBtn.style.display  = 'none';
  if (signupBtn) signupBtn.style.display = 'none';
  const greeting = document.createElement('span');
  greeting.style.cssText = 'color:#fff;font-weight:600;font-size:0.9rem;display:flex;align-items:center;gap:8px;';
  greeting.innerHTML = `<i class="fas fa-user-circle" style="color:var(--primary);font-size:1.1rem;"></i>${user.firstName}`;
  const logoutBtn = document.createElement('button');
  logoutBtn.textContent = 'Logout';
  logoutBtn.className = 'btn-ghost';
  logoutBtn.style.cssText = 'cursor:pointer;border:none;background:none;';
  logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('zygobus_token');
    localStorage.removeItem('zygobus_user');
    window.location.href = '../index.html';
  });
  const hamburger = navActions.querySelector('.hamburger');
  navActions.insertBefore(logoutBtn, hamburger);
  navActions.insertBefore(greeting, logoutBtn);
  document.getElementById('bookingsContent').style.display = 'block';
} else {
  document.getElementById('loginPrompt').style.display = 'block';
}

// Hamburger
document.getElementById('hamburger')?.addEventListener('click', () => {
  document.getElementById('navLinks').classList.toggle('open');
});

let allBookings = [];

async function loadBookings() {
  try {
    const res = await fetch(`${API}/bookings`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (!res.ok) throw new Error('Failed to load');
    allBookings = await res.json();
  } catch {
    // Use localStorage fallback
    allBookings = JSON.parse(localStorage.getItem('zygobus_bookings') || '[]');
  }
  renderBookings('all');
}

function renderBookings(filter) {
  const list = document.getElementById('bookingList');
  let filtered = filter === 'all' ? allBookings : allBookings.filter(b => b.status === filter);

  if (!filtered.length) {
    list.innerHTML = `
      <div class="empty-bookings">
        <i class="fas fa-ticket-alt"></i>
        <h3>${filter === 'all' ? 'No Bookings Yet' : `No ${filter} bookings`}</h3>
        <p>Your bus booking history will appear here.</p>
        <a href="search-results.html"><i class="fas fa-search"></i> Search Buses</a>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(b => `
    <div class="bk-card">
      <div class="bk-card-top">
        <div class="bk-city">
          <div class="bk-city-name">${b.fromCity}</div>
          <div class="bk-city-sub">${b.departure || ''}</div>
        </div>
        <div class="bk-arrow"><i class="fas fa-long-arrow-alt-right"></i></div>
        <div class="bk-city">
          <div class="bk-city-name">${b.toCity}</div>
          <div class="bk-city-sub">${b.arrival || ''}</div>
        </div>
        <div class="bk-duration">
          <span>Duration</span>
          <strong>${b.duration || '–'}</strong>
        </div>
        <div class="bk-price">
          <div class="bk-price-val">₹${b.totalFare}</div>
          <div class="bk-price-sub">${b.seats} seat${b.seats > 1 ? 's' : ''}</div>
        </div>
      </div>
      <div class="bk-card-bottom">
        <div class="bk-meta"><i class="fas fa-calendar"></i> ${b.travelDate}</div>
        <div class="bk-meta"><i class="fas fa-bus"></i> ${b.operator}</div>
        <div class="bk-meta"><i class="fas fa-barcode"></i> ${b.bookingRef}</div>
        <span class="bk-status status-${b.status}">${b.status}</span>
        ${b.status === 'confirmed' ? `
          <div class="bk-actions">
            <button class="bk-action-btn cancel-btn" onclick="cancelBooking('${b.bookingRef}')">
              <i class="fas fa-times"></i> Cancel
            </button>
          </div>
        ` : ''}
      </div>
    </div>
  `).join('');
}

async function cancelBooking(ref) {
  if (!confirm('Are you sure you want to cancel this booking?')) return;
  try {
    const res = await fetch(`${API}/bookings/${ref}/cancel`, {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.ok) {
      showToast('Booking cancelled. Refund will be processed within 3-5 days.');
      loadBookings();
    }
  } catch {
    // Fallback: update locally
    const bookings = JSON.parse(localStorage.getItem('zygobus_bookings') || '[]');
    const bk = bookings.find(b => b.bookingRef === ref);
    if (bk) { bk.status = 'cancelled'; localStorage.setItem('zygobus_bookings', JSON.stringify(bookings)); }
    showToast('Booking cancelled.');
    loadBookings();
  }
}

// Tab filtering
document.querySelectorAll('.bk-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.bk-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    renderBookings(tab.dataset.filter);
  });
});

if (user) loadBookings();
</script>
</body>
</html>
